# Configuración de Nginx para Seguridad de Archivos

# Agregar al bloque server {} en la configuración de Nginx

server {
    # ... otras configuraciones ...
    
    # Límite de tamaño de archivos subidos
    client_max_body_size 10M;
    
    # Deshabilitar acceso directo a storage
    location ~ ^/storage/app {
        deny all;
        return 404;
    }
    
    # Proteger archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Denegar acceso a archivos ejecutables
    location ~* \.(exe|bat|cmd|sh|pl|cgi|asp|aspx|jsp|php)$ {
        deny all;
        return 404;
    }
    
    # Headers de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
    
    # Deshabilitar listado de directorios
    autoindex off;
    
    # Timeout para subidas
    client_body_timeout 60s;
    send_timeout 60s;
}
